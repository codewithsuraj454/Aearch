<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aearch — Search Reimagined</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080910;
  --surface: rgba(255,255,255,0.035);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-focus: rgba(139,92,246,0.6);
  --accent: #8b5cf6;
  --accent2: #06b6d4;
  --accent3: #f59e0b;
  --text-primary: #f1f0ef;
  --text-secondary: #9ca3af;
  --text-muted: #4b5563;
  --result-title: #a78bfa;
  --result-url: #34d399;
  --glow: rgba(139,92,246,0.15);
  --red: #f87171;
  --yellow: #fbbf24;
  --green: #34d399;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── BACKGROUND MESH ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(139,92,246,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(6,182,212,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(245,158,11,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ─── NOISE GRAIN OVERLAY ─── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.page-wrap {
  position: relative;
  z-index: 1;
}

/* ─── HOMEPAGE ─── */
#homepage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
}

.hero-wordmark {
  font-family: 'Playfair Display', serif;
  font-size: clamp(64px, 12vw, 120px);
  font-weight: 700;
  letter-spacing: -3px;
  line-height: 1;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #f1f0ef 0%, #a78bfa 40%, #06b6d4 80%, #fbbf24 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 6s ease-in-out infinite;
  background-size: 200% 200%;
}

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.hero-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 56px;
  opacity: 0;
  animation: fadeUp 0.8s 0.3s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SEARCH INPUT ─── */
.search-wrap {
  width: 100%;
  max-width: 680px;
  position: relative;
  opacity: 0;
  animation: fadeUp 0.8s 0.5s forwards;
}

.search-field {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0 60px 0 56px;
  height: 64px;
  font-family: 'DM Sans', sans-serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--text-primary);
  outline: none;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  caret-color: var(--accent);
}

.search-field::placeholder { color: var(--text-muted); }

.search-field:focus {
  border-color: var(--border-focus);
  background: rgba(139,92,246,0.05);
  box-shadow: 0 0 0 4px rgba(139,92,246,0.08), 0 20px 60px rgba(0,0,0,0.4);
}

.search-icon-wrap {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  transition: color 0.3s;
  display: flex;
  align-items: center;
}

.search-wrap:focus-within .search-icon-wrap { color: var(--accent); }

.search-actions {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 4px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: all 0.2s;
}

.icon-btn:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
}

.icon-btn.mic-btn:hover { color: var(--red); }

/* Suggestions Dropdown */
.suggestions-drop {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  background: rgba(15,16,22,0.95);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: none;
  z-index: 200;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.suggestions-drop.open { display: block; }

.sug-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 18px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 15px;
  color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.sug-item:last-child { border-bottom: none; }
.sug-item:hover, .sug-item.focused { background: var(--surface-hover); color: var(--text-primary); }

.sug-icon { color: var(--text-muted); flex-shrink: 0; }
.sug-text em { color: var(--accent); font-style: normal; font-weight: 600; }

/* Quick links */
.quick-links {
  margin-top: 48px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  opacity: 0;
  animation: fadeUp 0.8s 0.7s forwards;
}

.quick-link {
  padding: 8px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.2px;
}

.quick-link:hover {
  background: var(--surface-hover);
  border-color: rgba(139,92,246,0.3);
  color: var(--text-primary);
  transform: translateY(-1px);
}

/* Stats bar */
.stats-bar {
  margin-top: 60px;
  display: flex;
  gap: 40px;
  opacity: 0;
  animation: fadeUp 0.8s 0.9s forwards;
}

.stat-item { text-align: center; }

.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ─── RESULTS PAGE ─── */
#resultspage {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}

#resultspage.visible { display: flex; }

/* Results Header */
.rp-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,9,16,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
}

.rp-header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 24px;
}

.rp-logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  flex-shrink: 0;
  letter-spacing: -1px;
}

.rp-search-wrap {
  flex: 1;
  max-width: 620px;
  position: relative;
}

.rp-search-field {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0 50px 0 44px;
  height: 48px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s;
  backdrop-filter: blur(12px);
  caret-color: var(--accent);
}

.rp-search-field::placeholder { color: var(--text-muted); }

.rp-search-field:focus {
  border-color: var(--border-focus);
  background: rgba(139,92,246,0.05);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.08);
}

.rp-search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.rp-clear-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 8px;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: all 0.2s;
}

.rp-clear-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
.rp-clear-btn.visible { display: flex; }

/* Tabs */
.rp-tabs {
  display: flex;
  gap: 2px;
  background: var(--surface);
  border-radius: 12px;
  padding: 4px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.rp-tab {
  padding: 7px 16px;
  border: none;
  background: none;
  border-radius: 9px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}

.rp-tab:hover { color: var(--text-secondary); background: var(--surface-hover); }
.rp-tab.active { background: rgba(139,92,246,0.2); color: var(--accent); }

/* ─── RESULTS BODY ─── */
.rp-body {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 32px 60px;
  width: 100%;
  display: flex;
  gap: 40px;
  flex: 1;
}

/* Sidebar */
.rp-sidebar {
  width: 220px;
  flex-shrink: 0;
}

.sidebar-section {
  margin-bottom: 28px;
}

.sidebar-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.filter-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.2s;
  margin-bottom: 2px;
  border: 1px solid transparent;
}

.filter-chip:hover { background: var(--surface-hover); color: var(--text-primary); }
.filter-chip.active { background: rgba(139,92,246,0.1); color: var(--accent); border-color: rgba(139,92,246,0.2); }

.filter-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

.filter-count {
  margin-left: auto;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  opacity: 0.5;
}

/* ─── MAIN RESULTS ─── */
.rp-main { flex: 1; min-width: 0; }

.results-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.results-count {
  font-size: 13px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

.results-count span { color: var(--accent2); }

.sort-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}

.sort-btn:hover { background: var(--surface-hover); color: var(--text-primary); }

/* ─── WEB RESULT CARD ─── */
.result-card {
  padding: 24px;
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 12px;
  background: var(--surface);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.result-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(139,92,246,0.04) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}

.result-card:hover {
  border-color: rgba(139,92,246,0.25);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(139,92,246,0.1);
}

.result-card:hover::before { opacity: 1; }

.result-meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.result-favicon {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
}

.result-domain {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--result-url);
  letter-spacing: 0.5px;
}

.result-breadcrumb {
  font-size: 11px;
  color: var(--text-muted);
}

.result-badge {
  margin-left: auto;
  padding: 2px 8px;
  background: rgba(6,182,212,0.1);
  border: 1px solid rgba(6,182,212,0.2);
  border-radius: 100px;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--accent2);
  letter-spacing: 1px;
}

.result-title {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  font-weight: 400;
  color: var(--result-title);
  line-height: 1.35;
  margin-bottom: 10px;
  display: block;
  text-decoration: none;
  transition: color 0.2s;
}

.result-title:hover { color: #c4b5fd; }

.result-snippet {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.result-snippet em {
  color: var(--text-primary);
  font-style: normal;
  font-weight: 500;
  background: rgba(139,92,246,0.15);
  border-radius: 3px;
  padding: 0 3px;
}

/* ─── IMAGE GRID ─── */
.img-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.img-card {
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  group: true;
}

.img-card:hover {
  transform: scale(1.03);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  border-color: rgba(139,92,246,0.3);
  z-index: 2;
}

.img-thumb-wrap {
  aspect-ratio: 4/3;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  position: relative;
}

.img-thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}

.img-card:hover .img-thumb-wrap img { transform: scale(1.06); }

.img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  align-items: flex-end;
  padding: 12px;
}

.img-card:hover .img-overlay { opacity: 1; }

.img-overlay-text {
  font-size: 11px;
  color: rgba(255,255,255,0.9);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.img-meta {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.img-meta-fav {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
}

.img-meta-domain {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ─── VIDEO CARDS ─── */
.video-card {
  display: flex;
  gap: 20px;
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 12px;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

.video-card:hover {
  border-color: rgba(139,92,246,0.25);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

.video-thumb-wrap {
  width: 220px;
  aspect-ratio: 16/9;
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  background: rgba(255,255,255,0.04);
}

.video-thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s;
}

.video-card:hover .video-thumb-wrap img { transform: scale(1.05); }

.video-play-btn {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  transition: background 0.2s;
}

.video-card:hover .video-play-btn { background: rgba(139,92,246,0.3); }

.video-play-circle {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-duration-badge {
  position: absolute;
  bottom: 6px;
  right: 6px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 6px;
}

.video-info { flex: 1; min-width: 0; }

.video-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--result-title);
  line-height: 1.35;
  margin-bottom: 8px;
}

.video-source-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.video-source-fav {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  object-fit: cover;
}

.video-source-name { font-size: 12px; color: var(--result-url); font-family: 'DM Mono', monospace; }

.video-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── FILE CARDS ─── */
.file-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

.file-card:hover {
  border-color: rgba(139,92,246,0.25);
  transform: translateY(-1px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
}

.file-ext-badge {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}

.file-ext-pdf { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.file-ext-doc { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }
.file-ext-xls { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.file-ext-zip { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
.file-ext-default { background: rgba(139,92,246,0.15); color: var(--accent); border: 1px solid rgba(139,92,246,0.2); }

.file-info { flex: 1; min-width: 0; }

.file-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-meta-row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

.file-meta-dot { opacity: 0.3; }

.file-dl-btn {
  padding: 8px 18px;
  background: rgba(139,92,246,0.15);
  border: 1px solid rgba(139,92,246,0.3);
  border-radius: 10px;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.file-dl-btn:hover { background: rgba(139,92,246,0.25); border-color: rgba(139,92,246,0.5); }

/* ─── IMAGE MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(8px);
}

.modal-overlay.open { display: flex; animation: modalIn 0.2s ease; }

@keyframes modalIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-box {
  background: #111218;
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  max-width: 900px;
  width: 100%;
  box-shadow: 0 40px 100px rgba(0,0,0,0.7);
  animation: modalBoxIn 0.25s cubic-bezier(0.4,0,0.2,1);
}

@keyframes modalBoxIn {
  from { transform: scale(0.94) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.modal-img-wrap {
  width: 100%;
  max-height: 65vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0b10;
}

.modal-img-wrap img {
  max-width: 100%;
  max-height: 65vh;
  object-fit: contain;
  display: block;
}

.modal-footer {
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-top: 1px solid var(--border);
}

.modal-favicon {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  object-fit: cover;
}

.modal-info-text { flex: 1; min-width: 0; }
.modal-img-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.modal-img-domain { font-size: 12px; color: var(--result-url); font-family: 'DM Mono', monospace; }

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  background: rgba(15,16,22,0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
  font-size: 20px;
}

.modal-close:hover { background: var(--surface-hover); color: var(--text-primary); border-color: rgba(139,92,246,0.3); }

.modal-action-btn {
  padding: 9px 20px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.modal-action-btn.primary {
  background: rgba(139,92,246,0.2);
  border: 1px solid rgba(139,92,246,0.35);
  color: var(--accent);
}

.modal-action-btn.primary:hover { background: rgba(139,92,246,0.3); }

.modal-action-btn.ghost {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.modal-action-btn.ghost:hover { background: var(--surface-hover); color: var(--text-primary); }

/* ─── NO RESULTS ─── */
.no-results {
  padding: 60px 20px;
  text-align: center;
}

.no-results-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.no-results-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  margin-bottom: 8px;
  color: var(--text-primary);
}

.no-results-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

.no-results-tips {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 320px;
  margin: 0 auto;
  text-align: left;
}

.tip-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-muted);
  padding: 10px 14px;
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
}

.tip-bullet {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* ─── LOADING SKELETON ─── */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
  background-size: 200% 100%;
  animation: skeleton-wave 1.4s ease infinite;
  border-radius: 8px;
}

@keyframes skeleton-wave {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skel-card {
  padding: 24px;
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 12px;
  background: var(--surface);
}

.skel-row { height: 12px; border-radius: 6px; margin-bottom: 10px; }

/* ─── ANIMATIONS ─── */
.fade-in {
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ─── RESPONSIVE ─── */
@media (max-width: 900px) {
  .rp-sidebar { display: none; }
  .rp-header-inner { gap: 12px; }
  .rp-tabs { display: none; }
  .mobile-tabs { display: flex; }
}

@media (max-width: 640px) {
  .rp-body { padding: 20px 16px 40px; }
  .rp-header { padding: 12px 16px; }
  .video-card { flex-direction: column; }
  .video-thumb-wrap { width: 100%; }
  .img-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-bar { gap: 24px; }
  .stat-num { font-size: 22px; }
}

/* Mobile tabs */
.mobile-tabs {
  display: none;
  gap: 2px;
  overflow-x: auto;
  padding: 8px 16px 0;
  border-bottom: 1px solid var(--border);
  background: rgba(8,9,16,0.85);
  scrollbar-width: none;
}
.mobile-tabs::-webkit-scrollbar { display: none; }

.mobile-tab {
  padding: 8px 16px;
  border: none;
  background: none;
  border-radius: 0;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}

.mobile-tab:hover { color: var(--text-secondary); }
.mobile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

@media (max-width: 900px) {
  .mobile-tabs { display: flex; }
}
</style>

<div class="page-wrap">

══════════════════════════════════ -->
<section id="resultspage">

      <div class="rp-search-wrap">

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>

        </button>
        <button class="rp-tab" data-tab="videos" onclick="switchTab('videos')">

        <button class="rp-tab" data-tab="files" onclick="switchTab('files')">

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

<script>
// ══════════════════════════════════
// DATA & STATE
// ══════════════════════════════════
var PAGES = [], IMAGES = [], VIDEOS = [], FILES = [];
var currentQuery = '', currentTab = 'all';
var currentModalData = null;

// Load data
function loadData() {
  loadJSON('data.json', function(d) {
    PAGES = [];
    for (var k in d) { if (d.hasOwnProperty(k)) PAGES.push(d[k]); }
  });
  loadJSON('images.json', function(d) { IMAGES = d; });
  loadJSON('videos.json', function(d) { VIDEOS = d; });
  loadJSON('files.json', function(d) { FILES = d; });
}

function loadJSON(url, cb) {
  var x = new XMLHttpRequest();
  x.open('GET', url, true);
  x.onreadystatechange = function() {
    if (x.readyState === 4 && x.status === 200) {
      try { cb(JSON.parse(x.responseText)); } catch(e) {}
    }
  };
  x.send();
}

window.addEventListener('load', loadData);

// ══════════════════════════════════
// HOME SEARCH
// ══════════════════════════════════
var homeSearch = document.getElementById('homeSearch');
var homeClearBtn = document.getElementById('homeClearBtn');

homeSearch.addEventListener('input', function() {
  currentQuery = this.value.trim();
  homeClearBtn.style.display = currentQuery ? 'flex' : 'none';
  showSuggestions(currentQuery);
});

homeSearch.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && currentQuery) goToResults(currentQuery);
  if (e.key === 'Escape') closeSuggestions();
});

homeClearBtn.addEventListener('click', function() {
  homeSearch.value = ''; currentQuery = '';
  homeClearBtn.style.display = 'none';
  closeSuggestions();
});

// Suggestion phrases (mock)
var SUGGESTIONS = [
  'technology trends 2025','tech companies','technology news',
  'science breakthroughs','science articles','scientific research',
  'design principles','design systems','ux design',
  'programming tutorials','python programming','javascript programming',
  'health news','mental health','health tips',
  'finance news','personal finance','stock market',
  'artificial intelligence','machine learning','deep learning',
  'climate change','renewable energy','sustainability',
  'space exploration','nasa','astronomy'
];

function showSuggestions(q) {
  var drop = document.getElementById('homeSuggestions');
  if (!q || q.length < 2) { drop.className = 'suggestions-drop'; return; }

  var matches = SUGGESTIONS.filter(function(s) {
    return s.toLowerCase().indexOf(q.toLowerCase()) !== -1;
  }).slice(0, 6);

  if (!matches.length) { drop.className = 'suggestions-drop'; return; }

  var html = '';
  matches.forEach(function(m) {
    var highlighted = m.replace(new RegExp('(' + escapeReg(q) + ')', 'gi'), '<em>$1</em>');
    html += '<div class="sug-item" onclick="doQuickSearch(\'' + m + '\')">' +
      '<svg class="sug-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>' +
      '<span class="sug-text">' + highlighted + '</span>' +
    '</div>';
  });

  drop.innerHTML = html;
  drop.className = 'suggestions-drop open';
}

function closeSuggestions() {
  document.getElementById('homeSuggestions').className = 'suggestions-drop';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) closeSuggestions();
});

function escapeReg(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function doQuickSearch(q) {
  homeSearch.value = q;
  currentQuery = q;
  closeSuggestions();
  goToResults(q);
}

// ══════════════════════════════════
// PAGE TRANSITIONS
// ══════════════════════════════════
function goToResults(q) {
  currentQuery = q.trim();
  if (!currentQuery) return;

  document.getElementById('homepage').style.display = 'none';
  var rp = document.getElementById('resultspage');
  rp.className = 'visible';
  document.getElementById('rpSearch').value = currentQuery;
  document.getElementById('rpClearBtn').className = 'rp-clear-btn visible';

  showLoading();
  setTimeout(performSearch, 120);
}

function goHome() {
  document.getElementById('homepage').style.display = 'flex';
  document.getElementById('resultspage').className = '';
  document.getElementById('homeSearch').value = currentQuery;
  homeSearch.focus();
}

// ══════════════════════════════════
// RESULTS-PAGE SEARCH
// ══════════════════════════════════
var rpSearch = document.getElementById('rpSearch');
var rpClearBtn = document.getElementById('rpClearBtn');

rpSearch.addEventListener('input', function() {
  currentQuery = this.value.trim();
  rpClearBtn.className = currentQuery ? 'rp-clear-btn visible' : 'rp-clear-btn';
  if (currentQuery) { showLoading(); setTimeout(performSearch, 200); }
});

rpSearch.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && currentQuery) { showLoading(); setTimeout(performSearch, 120); }
});

rpClearBtn.addEventListener('click', function() {
  rpSearch.value = ''; currentQuery = '';
  rpClearBtn.className = 'rp-clear-btn';
  document.getElementById('resultsContainer').innerHTML = '';
  document.getElementById('resultsMeta').style.display = 'none';
});

// ══════════════════════════════════
// TABS
// ══════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.rp-tab, .mobile-tab').forEach(function(t) {
    if (t.getAttribute('data-tab') === tab) {
      t.className = (t.className.indexOf('mobile') > -1 ? 'mobile-tab' : 'rp-tab') + ' active';
    } else {
      t.className = t.className.indexOf('mobile') > -1 ? 'mobile-tab' : 'rp-tab';
    }
  });
  if (currentQuery) { showLoading(); setTimeout(performSearch, 80); }
}

// ══════════════════════════════════
// SCORING
// ══════════════════════════════════
function tokens(s) {
  return s.toLowerCase().split(/\W+/).filter(function(t) { return t.length > 0; });
}

function matchScore(text, q) {
  if (!text) return 0;
  var t = text.toLowerCase();
  var score = 0;
  var qt = tokens(q);
  qt.forEach(function(tok) {
    if (t.indexOf(tok) !== -1) score += tok.length <= 2 ? 4 : 10;
  });
  if (t.indexOf(q.toLowerCase()) !== -1) score += 40;
  return score;
}

function scoreWeb(p, q) {
  var s = matchScore(p.title, q) * 10 + matchScore(p.url, q) * 6 + matchScore(p.description, q) * 2;
  if (p.pagerank) s += p.pagerank * 20;
  return s;
}

function scoreImg(i, q) {
  return matchScore(i.img_title, q) * 10 + matchScore(i.page_title, q) * 4 + matchScore(i.page_url, q) * 2;
}

function scoreVid(v, q) {
  return matchScore(v.video_title, q) * 10 + matchScore(v.page_title, q) * 4;
}

function scoreFile(f, q) {
  return matchScore(f.file_title, q) * 10 + matchScore(f.page_title, q) * 4 + matchScore(f.file_url, q) * 3;
}

// ══════════════════════════════════
// SEARCH DISPATCHER
// ══════════════════════════════════
function showLoading() {
  var container = document.getElementById('resultsContainer');
  var html = '';
  for (var i = 0; i < 4; i++) {
    html += '<div class="skel-card">' +
      '<div class="skel-row skeleton" style="width:40%;height:11px;margin-bottom:12px;"></div>' +
      '<div class="skel-row skeleton" style="width:75%;height:20px;margin-bottom:14px;"></div>' +
      '<div class="skel-row skeleton" style="width:90%;height:12px;"></div>' +
      '<div class="skel-row skeleton" style="width:70%;height:12px;margin-top:6px;"></div>' +
    '</div>';
  }
  container.innerHTML = html;
  document.getElementById('resultsMeta').style.display = 'none';
}

function performSearch() {
  if (currentTab === 'all') renderWeb();
  else if (currentTab === 'images') renderImages();
  else if (currentTab === 'videos') renderVideos();
  else if (currentTab === 'files') renderFiles();
}

function fmtNum(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function getDomain(url) {
  try {
    var a = document.createElement('a');
    a.href = url;
    return a.hostname.replace(/^www\./, '');
  } catch(e) { return url; }
}

function highlightQuery(text, q) {
  if (!text || !q) return text || '';
  var t = tokens(q);
  var result = text;
  t.forEach(function(tok) {
    if (tok.length < 2) return;
    result = result.replace(new RegExp('(' + escapeReg(tok) + ')', 'gi'), '<em>$1</em>');
  });
  return result;
}

function setMeta(count, label) {
  var meta = document.getElementById('resultsMeta');
  var countEl = document.getElementById('resultsCount');
  meta.style.display = 'flex';
  countEl.innerHTML = 'About <span>' + fmtNum(count) + '</span> ' + label;
}

// ── Web ──
function renderWeb() {
  var scored = [];
  PAGES.forEach(function(p) {
    var s = scoreWeb(p, currentQuery);
    if (s > 0) scored.push({p:p, s:s});
  });
  scored.sort(function(a,b) { return b.s - a.s; });

  var container = document.getElementById('resultsContainer');

  if (!scored.length) { container.innerHTML = noResultsHTML(); document.getElementById('resultsMeta').style.display = 'none'; return; }

  setMeta(scored.length, 'results');

  var html = '';
  var seen = {}, count = 0;
  for (var i = 0; i < scored.length && count < 20; i++) {
    var p = scored[i].p;
    var domain = getDomain(p.url);
    if (seen[domain]) continue;
    seen[domain] = true; count++;

    var fav = p.favicon || ('https://www.google.com/s2/favicons?domain=' + domain + '&sz=32');
    var snippet = highlightQuery(p.description || '', currentQuery);
    var titleHL = highlightQuery(p.title || p.url, currentQuery);

    // Badge for top results
    var badge = count <= 3 ? '<span class="result-badge">TOP</span>' : '';

    html += '<div class="result-card fade-in" style="animation-delay:' + (count * 40) + 'ms" onclick="window.open(\'' + p.url.replace(/'/g,"&#39;") + '\',\'_blank\')">' +
      '<div class="result-meta-row">' +
        '<img class="result-favicon" src="' + fav + '" onerror="this.src=\'https://www.google.com/s2/favicons?domain=' + domain + '\'" alt="">' +
        '<span class="result-domain">' + domain + '</span>' +
        badge +
      '</div>' +
      '<a class="result-title" href="' + p.url + '" target="_blank" onclick="event.stopPropagation()">' + (p.title || p.url) + '</a>' +
      '<div class="result-snippet">' + (snippet || 'No description available.') + '</div>' +
    '</div>';
  }

  // Sidebar filters
  updateSidebarFilters(scored.slice(0, 20));

  container.innerHTML = html;
}

function updateSidebarFilters(scored) {
  var domains = {};
  scored.forEach(function(r) {
    var d = getDomain(r.p.url);
    if (!domains[d]) domains[d] = 0;
    domains[d]++;
  });

  var chips = '';
  chips += '<div class="filter-chip active" onclick=""><div class="filter-dot"></div> All results <span class="filter-count">' + scored.length + '</span></div>';

  var topDomains = Object.keys(domains).sort(function(a,b) { return domains[b] - domains[a]; }).slice(0, 6);
  topDomains.forEach(function(d) {
    chips += '<div class="filter-chip" onclick=""><div class="filter-dot"></div> ' + d + ' <span class="filter-count">' + domains[d] + '</span></div>';
  });

  document.getElementById('filterChips').innerHTML = chips;
}

// ── Images ──
function renderImages() {
  var scored = [];
  IMAGES.forEach(function(img) {
    var s = scoreImg(img, currentQuery);
    if (s > 0) scored.push({i:img, s:s});
  });
  scored.sort(function(a,b) { return b.s - a.s; });

  var container = document.getElementById('resultsContainer');
  if (!scored.length) { container.innerHTML = noResultsHTML(); document.getElementById('resultsMeta').style.display = 'none'; return; }
  setMeta(scored.length, 'image results');

  var html = '<div class="img-grid">';
  var seen = {}, count = 0;
  for (var i = 0; i < scored.length && count < 40; i++) {
    var img = scored[i].i;
    var domain = getDomain(img.page_url || '');
    var fav = img.page_favicon || ('https://www.google.com/s2/favicons?domain=' + domain + '&sz=32');
    var title = img.img_title || img.page_title || 'Untitled';
    var idx = count;

    html += '<div class="img-card fade-in" style="animation-delay:' + (idx * 30) + 'ms" ' +
      'data-idx="' + i + '" onclick="openImgModal(\'' + i + '\')">' +
      '<div class="img-thumb-wrap">' +
        '<img src="' + img.img_url + '" alt="' + esc(title) + '" loading="lazy">' +
        '<div class="img-overlay"><div class="img-overlay-text">' + esc(title) + '</div></div>' +
      '</div>' +
      '<div class="img-meta">' +
        '<img class="img-meta-fav" src="' + fav + '" onerror="this.style.display=\'none\'" alt="">' +
        '<span class="img-meta-domain">' + domain + '</span>' +
      '</div>' +
    '</div>';
    count++;
  }
  html += '</div>';
  container.innerHTML = html;

  // Store for modal
  window._imgResults = scored;
}

function openImgModal(idx) {
  var img = window._imgResults[parseInt(idx)].i;
  currentModalData = img;
  document.getElementById('modalImg').src = img.img_url;
  document.getElementById('modalImgTitle').textContent = img.img_title || img.page_title || 'Image';
  var domain = getDomain(img.page_url || '');
  document.getElementById('modalImgDomain').textContent = domain;
  var fav = img.page_favicon || ('https://www.google.com/s2/favicons?domain=' + domain + '&sz=32');
  document.getElementById('modalFav').src = fav;
  document.getElementById('imgModal').className = 'modal-overlay open';
}

function closeImgModal() {
  document.getElementById('imgModal').className = 'modal-overlay';
}

// ── Videos ──
function renderVideos() {
  var scored = [];
  VIDEOS.forEach(function(v) {
    var s = scoreVid(v, currentQuery);
    if (s > 0) scored.push({v:v, s:s});
  });
  scored.sort(function(a,b) { return b.s - a.s; });

  var container = document.getElementById('resultsContainer');
  if (!scored.length) { container.innerHTML = noResultsHTML(); document.getElementById('resultsMeta').style.display = 'none'; return; }
  setMeta(scored.length, 'video results');

  var html = '';
  var seen = {}, count = 0;
  for (var i = 0; i < scored.length && count < 20; i++) {
    var v = scored[i].v;
    var domain = getDomain(v.page_url || '');
    var fav = v.page_favicon || ('https://www.google.com/s2/favicons?domain=' + domain + '&sz=32');
    var title = v.video_title || v.page_title || 'Untitled Video';

    html += '<div class="video-card fade-in" style="animation-delay:' + (count*50) + 'ms" onclick="window.open(\'' + (v.video_url||v.page_url||'').replace(/'/g,"&#39;") + '\',\'_blank\')">' +
      '<div class="video-thumb-wrap">' +
        '<img src="' + (v.thumbnail || '') + '" alt="' + esc(title) + '" onerror="this.style.opacity=\'0\'">' +
        '<div class="video-play-btn"><div class="video-play-circle">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="#111"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
        '</div></div>' +
        '<span class="video-duration-badge">—:——</span>' +
      '</div>' +
      '<div class="video-info">' +
        '<div class="video-title">' + esc(title) + '</div>' +
        '<div class="video-source-row">' +
          '<img class="video-source-fav" src="' + fav + '" onerror="this.style.display=\'none\'" alt="">' +
          '<span class="video-source-name">' + domain + '</span>' +
        '</div>' +
        '<div class="video-desc">' + esc(v.page_title || 'Watch this video') + '</div>' +
      '</div>' +
    '</div>';
    count++;
  }
  container.innerHTML = html;
}

// ── Files ──
var EXT_CLASSES = { 'PDF':'file-ext-pdf', 'DOC':'file-ext-doc', 'DOCX':'file-ext-doc', 'XLS':'file-ext-xls', 'XLSX':'file-ext-xls', 'ZIP':'file-ext-zip', 'RAR':'file-ext-zip' };

function renderFiles() {
  var scored = [];
  FILES.forEach(function(f) {
    var s = scoreFile(f, currentQuery);
    if (s > 0) scored.push({f:f, s:s});
  });
  scored.sort(function(a,b) { return b.s - a.s; });

  var container = document.getElementById('resultsContainer');
  if (!scored.length) { container.innerHTML = noResultsHTML(); document.getElementById('resultsMeta').style.display = 'none'; return; }
  setMeta(scored.length, 'file results');

  var html = '';
  var seen = {}, count = 0;
  for (var i = 0; i < scored.length && count < 20; i++) {
    var f = scored[i].f;
    var domain = getDomain(f.page_url || '');
    var urlParts = (f.file_url || '').split('.');
    var ext = urlParts[urlParts.length - 1].toUpperCase().substring(0, 4);
    var extClass = EXT_CLASSES[ext] || 'file-ext-default';
    var title = f.file_title || f.file_url || 'File';

    html += '<div class="file-card fade-in" style="animation-delay:' + (count*40) + 'ms">' +
      '<div class="file-ext-badge ' + extClass + '">' + ext + '</div>' +
      '<div class="file-info">' +
        '<div class="file-name">' + esc(title) + '</div>' +
        '<div class="file-meta-row">' +
          '<span>' + domain + '</span>' +
          '<span class="file-meta-dot">·</span>' +
          '<span>' + ext + ' file</span>' +
        '</div>' +
      '</div>' +
      '<button class="file-dl-btn" onclick="window.open(\'' + (f.file_url||'').replace(/'/g,"&#39;") + '\',\'_blank\')">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
        'Download' +
      '</button>' +
    '</div>';
    count++;
  }
  container.innerHTML = html;
}

// ── No Results ──
function noResultsHTML() {
  return '<div class="no-results">' +
    '<div class="no-results-icon">◉</div>' +
    '<div class="no-results-title">No results found</div>' +
    '<div class="no-results-sub">for "<strong>' + esc(currentQuery) + '</strong>"</div>' +
    '<div class="no-results-tips">' +
      '<div class="tip-item"><div class="tip-bullet"></div>Check spelling and try again</div>' +
      '<div class="tip-item"><div class="tip-bullet"></div>Use more general keywords</div>' +
      '<div class="tip-item"><div class="tip-bullet"></div>Try fewer search terms</div>' +
    '</div>' +
  '</div>';
}

// ── Utilities ──
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    var rp = document.getElementById('resultspage');
    if (rp.className.indexOf('visible') > -1) {
      document.getElementById('rpSearch').focus();
    } else {
      document.getElementById('homeSearch').focus();
    }
  }
  if (e.key === 'Escape') {
    closeSuggestions();
    closeImgModal();
  }
});

// animate stat counter
function animateCounter(el, target, suffix) {
  var start = 0;
  var step = Math.ceil(target / 40);
  var interval = setInterval(function() {
    start += step;
    if (start >= target) { start = target; clearInterval(interval); }
    el.textContent = fmtNum(start) + suffix;
  }, 35);
}

window.addEventListener('load', function() {
  setTimeout(function() {
    var statEl = document.getElementById('statPages');
    animateCounter(statEl, 200, 'K+');
  }, 1000);
});
</script>
